<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Research network thumbnail</title>
  <desc id="desc">A stylized network of papers and collaborators connected by curved links.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.5" stop-color="#edf7f2"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#15324a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="600" cy="380" r="430" fill="url(#halo)"/>

  <g fill="none" stroke-linecap="round" stroke-opacity="0.56">
    <path d="M300 266 C398 170 535 154 626 265" stroke="#2c7be5" stroke-width="7"/>
