name: "📝 Blog post submission"
description: "研究室ブログ投稿を申請します（承認後に公開）"
title: "[Blog] "
labels: ["blog-post"]
body:
  - type: markdown
    attributes:
      value: |
        以下のフォームを入力して投稿申請してください。
        Please fill out the form below to submit a blog post request.

        - 画像は「本文」欄にドラッグ&ドロップで添付できます。
          You can drag and drop images into the "本文 / Body" field.
        - 添付画像は自動で `assets/img/posts/` に保存され、本文リンクも自動で置換されます。
          Attached images are automatically saved to `assets/img/posts/`, and links in the post body are rewritten automatically.
        - 公開は管理者レビュー後です。
          Publication happens only after maintainer review and approval.
        - `Add a title` は Issue 管理用です。記事タイトルには `記事タイトル / Post Title` が使われます。
          `Add a title` is only for issue tracking. `記事タイトル / Post Title` is used as the blog post title.
        - 投稿者は GitHub ユーザー名から自動取得されます（入力不要）。
          Author is automatically derived from your GitHub username.
          例: `kfuku52 (Kenji Fukushima)`（`kfuku52` はプロフィールページへのリンクになります）
          Example: `kfuku52 (Kenji Fukushima)` where `kfuku52` links to the GitHub profile.

  - type: input
    id: post_title
    attributes:
      label: 記事タイトル / Post Title
      placeholder: 例）学会発表を行いました
    validations:
      required: true

  - type: input
    id: post_date
    attributes:
      label: 記事日付 / Article Date (YYYY-MM-DD)
      description: 公開時の記事日付です / Publication date of the post
      placeholder: "2026-03-04"
    validations:
      required: true

  - type: dropdown
    id: lang
    attributes:
      label: 言語 / Language
      options:
        - ja
        - en-us
      default: 0
    validations:
      required: true

  - type: input
    id: slug
    attributes:
      label: URLスラッグ / URL Slug（英数字とハイフン、任意 / optional）
      description: 空欄の場合はタイトルから自動生成します / If empty, it will be generated from the title
      placeholder: 例）conference-report-2026
    validations:
      required: false

  - type: textarea
    id: content
    attributes:
      label: 本文 / Body (Markdown)
      description: Markdownで本文を入力してください。画像添付もここで行えます。 / Write the post body in Markdown. You can also attach images here.
      placeholder: |
        ここに本文を書いてください。
        Write your post content here.

        画像を挿入したい場合は、この欄にドラッグ&ドロップしてください。
        To insert images, drag and drop them into this field.
    validations:
      required: true

  - type: checkboxes
    id: consent
    attributes:
      label: 確認事項 / Confirmation
      options:
        - label: 投稿内容は研究室サイトに公開可能な内容であることを確認しました。 / I confirm that this content is suitable for publication on the lab website.
          required: true
