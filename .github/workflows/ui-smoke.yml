name: UI Smoke Tests

on:
  push:
    branches:
      - main
      - master
    paths:
      - "assets/**"
      - "_sass/**"
      - "_includes/**"
      - "_layouts/**"
      - "_plugins/**"
      - "_pages/**"
      - "_projects/**"
      - "_profiles/**"
      - "_posts/**"
      - "_news/**"
      - "_data/**"
      - "_bibliography/**"
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.js"
      - "tests/ui/**"
      - "test/**"
      - ".github/scripts/prepare-jekyll-build-env.sh"
      - ".github/workflows/ui-smoke.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "assets/**"
      - "_sass/**"
      - "_includes/**"
      - "_layouts/**"
      - "_plugins/**"
      - "_pages/**"
      - "_projects/**"
      - "_profiles/**"
      - "_posts/**"
      - "_news/**"
      - "_data/**"
      - "_bibliography/**"
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.js"
      - "tests/ui/**"
      - "test/**"
      - ".github/scripts/prepare-jekyll-build-env.sh"
      - ".github/workflows/ui-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Run Ruby unit tests
        run: bundle exec ruby -Itest test/paper_network_test.rb
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install Node dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Build site
        run: |
          bash .github/scripts/prepare-jekyll-build-env.sh
          export JEKYLL_ENV=production
          bundle exec jekyll build
      - name: Start local server
        run: |
          python3 -m http.server 8080 --directory _site >/tmp/ui-smoke-http.log 2>&1 &
          sleep 1
      - name: Run UI smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
        run: npm run test:ui
